version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: apikey_postgres
    restart: always
    environment:
      POSTGRES_DB: apikeydb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"

  app:
    build: .
    container_name: apikey_manager
    depends_on:
      - postgres
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apikeydb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres