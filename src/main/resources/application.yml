spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/apikeydb}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081
  tomcat:
    threads:
      max: 200
    accept-count: 100

logging:
  level:
    root: INFO
    org.springframework: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000

