spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/apikey_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

logging:
  level:
    root: INFO
    org.springframework: INFO

jwt:
  secret: MyStrongJwtSecretKeyForDevEnvironmentOnly123456!
  expiration: 3600000

